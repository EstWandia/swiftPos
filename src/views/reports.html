<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SwiftPOS — Reports</title>
<link rel="stylesheet" href="/css/main.css">
<style>
/* ── Layout: topbar(54px) + page-body(flex:1) + statusbar(30px) ── */
body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}
.page-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 16px 48px; /* 48px so content clears the fixed statusbar */
  -webkit-overflow-scrolling: touch; /* smooth iOS scroll */
}

/* ── Date range picker row ── */
.dr {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.dr-label { font-size: 12px; color: var(--t2); font-weight: 600; white-space: nowrap; }
.dr input[type=date] {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--rs); color: var(--text);
  font-family: var(--font); font-size: 12px;
  padding: 7px 10px; outline: none;
  width: auto; min-width: 0; flex-shrink: 1;
}
.dr input[type=date]:focus { border-color: var(--a); }

/* Quick buttons wrap on small screens */
.quick-btns {
  display: flex; gap: 6px; flex-wrap: wrap;
}

/* ── Stats grid ── */
.sg {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.sc {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
}
.sl { font-size: 10px; color: var(--t2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 7px; }
.sv { font-size: 24px; font-weight: 800; font-family: var(--mono); }
.sv.g { color: var(--green); } .sv.b { color: var(--a); } .sv.a { color: var(--amber); }

/* ── Section title ── */
.sec-t {
  font-size: 14px; font-weight: 700; color: var(--t2);
  margin: 24px 0 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* ── Desktop table (hidden on mobile) ── */
.tbl-wrap { overflow-x: auto; margin-bottom: 8px; }
table { width: 100%; border-collapse: collapse; }
th {
  font-size: 10px; font-weight: 700; color: var(--t3);
  text-transform: uppercase; letter-spacing: .7px;
  padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left;
  white-space: nowrap;
}
td { font-size: 13px; padding: 11px 12px; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--s2); }
.rank {
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(135deg, var(--a), var(--a2));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}

/* ── Mobile cards (shown only on small screens) ── */
.mob-cards { display: none; }

.item-card {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.item-card-rank {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--a), var(--a2));
  display: grid; place-items: center;
  font-size: 12px; font-weight: 800; color: #fff;
  flex-shrink: 0;
}
.item-card-body { flex: 1; min-width: 0; }
.item-card-name {
  font-size: 13px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.item-card-meta { font-size: 11px; color: var(--t2); }
.item-card-right { text-align: right; flex-shrink: 0; }
.item-card-rev { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--green); }
.item-card-qty { font-size: 11px; color: var(--t3); margin-top: 2px; }

.cat-card {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.cat-card-left { flex: 1; min-width: 0; }
.cat-card-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.cat-card-share {
  display: inline-block; height: 4px; border-radius: 4px;
  background: linear-gradient(135deg, var(--a), var(--a2));
  margin-top: 6px; max-width: 100%;
}
.cat-card-right { text-align: right; flex-shrink: 0; }
.cat-card-rev { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--green); }
.cat-card-qty { font-size: 11px; color: var(--t3); margin-top: 2px; }
.cat-card-pct { font-size: 11px; color: var(--t2); margin-top: 2px; }

/* ── Responsive switchover ── */
@media (max-width: 600px) {
  .tbl-wrap { display: none; }          /* hide table */
  .mob-cards { display: block; }        /* show cards */

  .sg { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .sc { padding: 11px 12px; }
  .sv { font-size: 20px; }

  .dr { gap: 6px; }
  .dr input[type=date] { font-size: 11px; padding: 6px 8px; }
  .quick-btns .btn { padding: 7px 10px; font-size: 11px; }
}
</style>
</head>
<body>

<header class="topbar">
  <span class="logo" id="bizName">⚡ SwiftPOS</span>
  <nav class="nav-links" id="navLinks"></nav>
  <div class="topbar-right">
    <div class="avatar" id="userAvatar" onclick="window.location='/auth/logout'" title="Sign out"></div>
  </div>
</header>

<div class="page-body">
  <h2 style="font-size:18px;margin-bottom:14px">📊 Sales Reports</h2>

  <!-- Date range row -->
  <div class="dr">
    <span class="dr-label">Period:</span>
    <input type="date" id="rFrom">
    <span style="color:var(--t2);font-size:13px">→</span>
    <input type="date" id="rTo">
    <div class="quick-btns">
      <button class="btn btn-primary" onclick="loadReport()">Load</button>
      <button class="btn btn-ghost" onclick="setQuick('today')">Today</button>
      <button class="btn btn-ghost" onclick="setQuick('week')">Week</button>
      <button class="btn btn-ghost" onclick="setQuick('month')">Month</button>
    </div>
  </div>

  <!-- Stats cards -->
  <div class="sg" id="statsGrid"><div class="spinner"></div></div>

  <!-- Top selling items -->
  <div class="sec-t">🏆 Top Selling Items</div>

  <!-- Desktop table -->
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr><th>#</th><th>Item</th><th>Category</th><th>Qty Sold</th><th>Revenue</th></tr>
      </thead>
      <tbody id="topItemsTbl"></tbody>
    </table>
  </div>

  <!-- Mobile cards -->
  <div class="mob-cards" id="topItemsCards"></div>

  <!-- Revenue by category -->
  <div class="sec-t">📂 Revenue by Category</div>

  <!-- Desktop table -->
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr><th>Category</th><th>Qty Sold</th><th>Revenue</th><th>Share</th></tr>
      </thead>
      <tbody id="catBreakTbl"></tbody>
    </table>
  </div>

  <!-- Mobile cards -->
  <div class="mob-cards" id="catBreakCards"></div>

</div>

<div class="statusbar">
  <span><span class="dot"></span>Online</span>
  <span id="clock" class="mono ml-auto"></span>
</div>
<div id="toast"></div>
<script src="/js/api.js"></script>
<script>
(async function(){
  try {
    const { user } = await API.get('/api/me');
    document.getElementById('userAvatar').textContent = user.name.slice(0,2).toUpperCase();
    document.getElementById('bizName').textContent    = user.business?.name || 'SwiftPOS';
    window._currSym = user.business?.currency_sym || '€';
    buildNav(user.role, '/reports');
  } catch { window.location.href = '/login'; return; }
  startClock('clock');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('rFrom').value = today.slice(0,8) + '01';
  document.getElementById('rTo').value   = today;
  loadReport();
})();

function setQuick(p) {
  const t = new Date(), y = d => d.toISOString().split('T')[0];
  if (p === 'today') {
    document.getElementById('rFrom').value = y(t);
    document.getElementById('rTo').value   = y(t);
  } else if (p === 'week') {
    const d = new Date(t); d.setDate(t.getDate() - t.getDay());
    document.getElementById('rFrom').value = y(d);
    document.getElementById('rTo').value   = y(t);
  } else if (p === 'month') {
    document.getElementById('rFrom').value = y(t).slice(0,8) + '01';
    document.getElementById('rTo').value   = y(t);
  }
  loadReport();
}

async function loadReport() {
  const df = document.getElementById('rFrom').value;
  const dt = document.getElementById('rTo').value;
  document.getElementById('statsGrid').innerHTML = '<div class="spinner"></div>';
  try {
    const { summary, topItems, catBreakdown } = await API.get(
      `/api/orders/summary/today?date_from=${df}&date_to=${dt}`
    );

    // ── Stats ──────────────────────────────────────────────────────────
    document.getElementById('statsGrid').innerHTML = `
      <div class="sc"><div class="sl">Orders</div><div class="sv b">${summary.order_count || 0}</div></div>
      <div class="sc"><div class="sl">Revenue</div><div class="sv g">${fmt(summary.revenue || 0)}</div></div>
      <div class="sc"><div class="sl">Tax</div><div class="sv">${fmt(summary.tax_collected || 0)}</div></div>
      <div class="sc"><div class="sl">Discounts</div><div class="sv a">${fmt(summary.discounts_given || 0)}</div></div>
      <div class="sc"><div class="sl">Avg. Order</div><div class="sv">${fmt(summary.avg_order_value || 0)}</div></div>`;

    // ── Top items — table rows ─────────────────────────────────────────
    const topList = topItems || [];
    document.getElementById('topItemsTbl').innerHTML = topList.length
      ? topList.map((it, i) => `
          <tr>
            <td><span class="rank">${i+1}</span></td>
            <td><span style="font-size:16px">${it.emoji||'🛒'}</span>
                <strong>${it.name}</strong>
                <span style="font-size:10px;color:var(--t3);margin-left:4px">${it.sku}</span></td>
            <td><span class="badge badge-blue">${it.category}</span></td>
            <td class="mono">${it.total_qty}</td>
            <td class="mono" style="color:var(--green)">${fmt(it.total_revenue)}</td>
          </tr>`).join('')
      : '<tr><td colspan="5"><div class="empty-state" style="padding:20px"><p>No sales data for this period</p></div></td></tr>';

    // ── Top items — mobile cards ───────────────────────────────────────
    document.getElementById('topItemsCards').innerHTML = topList.length
      ? topList.map((it, i) => `
          <div class="item-card">
            <div class="item-card-rank">${i+1}</div>
            <div class="item-card-body">
              <div class="item-card-name">${it.emoji||'🛒'} ${it.name}</div>
              <div class="item-card-meta">
                <span class="badge badge-blue" style="font-size:10px">${it.category}</span>
                &nbsp;${it.sku}
              </div>
            </div>
            <div class="item-card-right">
              <div class="item-card-rev">${fmt(it.total_revenue)}</div>
              <div class="item-card-qty">${it.total_qty} sold</div>
            </div>
          </div>`).join('')
      : '<div class="empty-state" style="padding:20px"><p>No sales data for this period</p></div>';

    // ── Category breakdown ─────────────────────────────────────────────
    const catList  = catBreakdown || [];
    const totalRev = catList.reduce((s,c) => s + parseFloat(c.revenue || 0), 0);

    document.getElementById('catBreakTbl').innerHTML = catList.length
      ? catList.map(c => `
          <tr>
            <td><strong>${c.category_name}</strong></td>
            <td class="mono">${c.qty_sold}</td>
            <td class="mono" style="color:var(--green)">${fmt(c.revenue)}</td>
            <td>${totalRev > 0 ? ((parseFloat(c.revenue)/totalRev)*100).toFixed(1)+'%' : '—'}</td>
          </tr>`).join('')
      : '<tr><td colspan="4"><div class="empty-state" style="padding:20px"><p>No data</p></div></td></tr>';

    // ── Category breakdown — mobile cards ─────────────────────────────
    document.getElementById('catBreakCards').innerHTML = catList.length
      ? catList.map(c => {
          const pct = totalRev > 0 ? ((parseFloat(c.revenue)/totalRev)*100).toFixed(1) : 0;
          const barW = totalRev > 0 ? Math.round((parseFloat(c.revenue)/totalRev)*100) : 0;
          return `
          <div class="cat-card">
            <div class="cat-card-left">
              <div class="cat-card-name">${c.category_name}</div>
              <div class="cat-card-share" style="width:${barW}%"></div>
            </div>
            <div class="cat-card-right">
              <div class="cat-card-rev">${fmt(c.revenue)}</div>
              <div class="cat-card-qty">${c.qty_sold} items</div>
              <div class="cat-card-pct">${pct}%</div>
            </div>
          </div>`;
        }).join('')
      : '<div class="empty-state" style="padding:20px"><p>No data</p></div>';

  } catch(e) {
    showToast(e.message, 'error');
    document.getElementById('statsGrid').innerHTML =
      `<p style="color:var(--red);padding:10px">${e.message}</p>`;
  }
}
</script>
</body>
</html>
